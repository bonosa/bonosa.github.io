<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Projects - Saroj Bono's Portfolio</title>
    <!-- Include your CSS here (either inline or through an external stylesheet) -->
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9; /* Soft background color */
            color: #333;
            line-height: 1.6;
        }
        header {
            background: #EAE7DC; /* Pastel header background */
            color: #333;
            padding: 20px 0;
            text-align: center;
        }
        header h1 {
            margin: 0;
        }
        header p {
            font-style: italic;
        }
        section {
            padding: 20px;
            margin: 20px 0;
        }
        h2 {
            color: #333;
        }
        .project {
            background: #ffffff; /* White background for project entries */
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd; /* subtle border */
            border-radius: 8px; /* slightly rounded corners for a modern feel */
        }
        .project h3 {
            margin-top: 0;
        }
        .project p {
            margin-bottom: 15px;
        }
        .button {
            display: inline-block;
            padding: 10px 15px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            color: #fff;
            background: #E98074; /* Button color */
            margin-right: 10px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .button:hover {
            background: #8E8D8A; /* Darker shade for hover */
        }
        footer {
            background: #EAE7DC; /* Pastel footer background */
            color: #333;
            text-align: center;
            padding: 10px;
            position: relative;
            bottom: 0;
            width: 100%;
        }
        @media only screen and (max-width: 600px) {
            .container, .project {
                width: 90%;
                margin: auto;
            }
        }
    </style>

</head>
<body>
    <header>
        <h1>Projects</h1>
        <p>A showcase of my work</p>
    </header>

    <section>
        <h2>Project 1</h2>
        <p>Description of Project 1. This could be more detailed compared to the main page.</p>
        <!-- Include more details like technologies used, your role, challenges, and learning outcomes -->
    </section>

    <section>
        <h2>Project 2</h2>
        <p>Description of Project 2.</p>
        <!-- Repeat the detailed structure for each project -->
    </section>

    <!-- Add more projects as needed -->

    <footer>
        <p>Contact me at <a href="mailto:bonosa@comcast.net">bonosa@comcast.net</a></p>
    </footer>
</body>
</html>
