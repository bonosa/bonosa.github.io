<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saroj Bono's Portfolio</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
            cursor: pointer;
        }

        #home {
            background-color: #d9eafd; /* Soft Blue for Welcome Banner */
            padding: 50px;
            text-align: center;
            margin-top: 50px; /* Adjusted for fixed nav */
            position: relative;
        }

        h1 {
            color: #222;
        }

        /* Ensure hamburger menu stays visible on all pages */
        #openSidebar {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 10px;
            background: transparent;
            color: black;
            border: none;
            cursor: pointer;
            z-index: 1001;
            font-size: 24px;
        }

        /* Move cut-off text to the right */
        footer {
            text-align: right;
            padding: 20px;
            margin-right: 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <button id="openSidebar">☰</button>

    <header id="home">
        <h1>Welcome to Saroj Bono's Portfolio</h1>
        <p>Building the future, one line of code at a time.</p>
    </header>

    <nav>
        <a href="#home" class="nav-link">Home</a>
        <a href="projects.html" class="nav-link">Projects</a>
        <a href="dashboard.html" class="nav-link">🛠️ Customize Sidebar</a>
        <a href="mailto:bonosa@comcast.net" class="nav-link">Contact</a>
    </nav>

    <footer>
        <p>Email: bonosa@comcast.net</p>
        <p>Phone: 850-774-4595</p>
    </footer>

    <!-- 🚀 Smooth Scrolling and Page Navigation -->
    <script>
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', function(event) {
                let targetPage = this.getAttribute("href");
                if (targetPage.startsWith("#")) {
                    event.preventDefault();
                    let targetId = targetPage.substring(1);
                    let targetElement = document.getElementById(targetId);
                    if (targetElement) {
                        window.scrollTo({
                            top: targetElement.offsetTop - 50,
                            behavior: "smooth"
                        });
                    }
                } else {
                    window.location.href = targetPage; // Load new page if not a section
                }
            });
        });
    </script>
    
    <!-- 🚀 Sidebar Script -->
    <script src="https://bonosa.github.io/sidebar/js/sidebar.js"></script>
</body>
</html>
