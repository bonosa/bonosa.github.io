<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saroj Bono's Portfolio</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
            color: #333;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 18px;
        }

        #home {
            background-color: #f3f3ff; /* Soft Blue-Gray Background */
            padding: 50px;
            text-align: center;
        }

        h1 {
            color: #222;
        }

        .copy-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        #embedCode {
            width: 80%;
            height: 50px;
            font-size: 14px;
            padding: 5px;
            border: 1px solid #ddd;
            background: #fff;
        }

        #copyButton {
            background: #007BFF;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s ease;
            border-radius: 5px;
        }

        #copyButton:hover {
            background: #0056b3;
        }

    </style>
</head>
<body>

    <nav>
        <a href="#home">Home</a>
        <a href="projects.html">Projects</a>
        <a href="mailto:bonosa@comcast.net">Contact</a>
    </nav>

    <header id="home">
        <h1>Welcome to Saroj Bono's Portfolio</h1>
        <p>Building the future, one line of code at a time.</p>
    </header>

    <section id="sidebar-demo">
        <h2>Sidebar Demo</h2>
        <p>Below is the embed code for adding the sidebar to any website.</p>

        <div class="copy-container">
            <textarea id="embedCode" readonly>
<script src="https://bonosa.github.io/sidebar/js/sidebar.js"></script>
<script>
window.sidebarConfig = {
    bgColor: "#d9eafd",
    textColor: "#3227d3",
    position: "left"
};
</script>
            </textarea>
            <button id="copyButton">📋 Copy</button>
        </div>
    </section>

    <footer>
        <p>Email: bonosa@comcast.net</p>
        <p>Phone: 850-774-4595</p>
    </footer>

    <script async data-id="1722646477" id="chatling-embed-script" type="text/javascript" src="https://chatling.ai/js/embed.js"></script>

    <!-- Sidebar Embed Code -->
    <script src="https://bonosa.github.io/sidebar/js/sidebar.js"></script>

    <!-- Copy Button JavaScript -->
    <script>
        document.getElementById("copyButton").addEventListener("click", function() {
            let embedCode = document.getElementById("embedCode");
            embedCode.select();
            document.execCommand("copy");

            let button = document.getElementById("copyButton");
            button.textContent = "✔ Copied!";
            button.style.background = "#28a745"; // Green color

            setTimeout(() => {
                button.textContent = "📋 Copy";
                button.style.background = "#007BFF"; // Revert to original color
            }, 2000);
        });
    </script>

</body>
</html>
